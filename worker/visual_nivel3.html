<input type="number" id="n3a" value="12" min="2" max="200" style="width:80px;font-size:14px;padding:6px 10px;border:1px solid #E8E8E4;border-radius:8px;font-family:'DM Sans',sans-serif" oninput="(function(){var a=Math.min(200,Math.max(2,parseInt(document.getElementById('n3a').value)||12));var b=Math.min(200,Math.max(2,parseInt(document.getElementById('n3b').value)||18));function pf(n){var f={},d=2;while(n>1){while(n%d===0){f[d]=(f[d]||0)+1;n=Math.floor(n/d);}d++;}return f;}function gcd(a,b){return b===0?a:gcd(b,a%b);}function lcm(a,b){return Math.floor(a/gcd(a,b))*b;}function sup(e){return e>1?(['','','²','³','⁴','⁵'][e]||'^'+e):'';}function ex(p,e){return p+sup(e);}function tree(n,cx,y,color){var f=pf(n),primes=[];for(var p in f)for(var i=0;i<f[p];i++)primes.push(parseInt(p));var h='<text x=\''+cx+'\' y=\''+y+'\' text-anchor=\'middle\' font-size=\'14\' font-weight=\'700\' fill=\''+color+'\'>'+n+'</text>';if(primes.length===1){h+='<circle cx=\''+cx+'\' cy=\''+(y+26)+'\' r=\'13\' fill=\'none\' stroke=\''+color+'\' stroke-width=\'1.5\'/><text x=\''+cx+'\' y=\''+(y+31)+'\' text-anchor=\'middle\' font-size=\'12\' font-weight=\'600\' fill=\''+color+'\'>'+n+'</text>';return h;}var sp=Math.min(130,Math.max(55,primes.length*28));var sx=cx-(sp*(primes.length-1))/2;for(var i=0;i<primes.length;i++){var px=sx+i*sp,py=y+58;h+='<line x1=\''+cx+'\' y1=\''+(y+8)+'\' x2=\''+px+'\' y2=\''+(py-13)+'\' stroke=\'#E8E8E4\' stroke-width=\'1\' stroke-dasharray=\'3,2\'/><circle cx=\''+px+'\' cy=\''+py+'\' r=\'13\' fill=\'#FAFAF8\' stroke=\''+color+'\' stroke-width=\'1.5\'/><text x=\''+px+'\' y=\''+(py+5)+'\' text-anchor=\'middle\' font-size=\'11\' font-weight=\'600\' fill=\''+color+'\'>'+primes[i]+'</text>';}return h;}var fa=pf(a),fb=pf(b);var mcd=gcd(a,b),mcm=lcm(a,b);document.getElementById('n3svg').innerHTML=tree(a,90,20,'#1D4ED8')+tree(b,270,20,'#2D6A4F');var all=new Set(Object.keys(fa).concat(Object.keys(fb)).map(Number));var mp=[],lp=[];all.forEach(function(p){var ea=fa[p]||0,eb=fb[p]
