  // ── Subtopic vertical flow ─────────────────────────────────────
  const PROXY_URL_ST = 'https://math-practice-proxy.ronelalmanza20.workers.dev';
  let _allPracticeProblems = [];
  let _stProgress = {};  // idx → { problems, probIdx, correct, wrongTotal, wrongOnCurrent, hintLevel, exStep, exOpen }

  function _stNormalize(s) {
    return String(s).trim().toLowerCase().replace(/\s+/g, '').replace(/×/g,'*').replace(/÷/g,'/');
  }

  function stCheckAnswer(input, problem) {
    const norm = _stNormalize(input);
    const ans  = _stNormalize(problem.answer);
    // numeric
    const nInput = parseFloat(norm), nAns = parseFloat(ans);
    if (!isNaN(nInput) && !isNaN(nAns) && Math.abs(nInput - nAns) < 1e-9) return true;
    // string
    if (norm === ans) return true;
    // Algebrite
    try {
      if (typeof Algebrite !== 'undefined') {
        const diff = Algebrite.run(`simplify((${norm})-(${ans}))`);
        if (diff === '0') return true;
      }
    } catch(e) {}
    return false;
  }

  async function startSubtopicFlow() {
    if (!lesson || !lesson.subtopics || !lesson.subtopics.length) { showConcepts(); return; }
    // fetch all practice problems for this level
    const curriculum = lesson.curriculum || 'PAA';
    const unit       = lesson.unit       || 'aritmetica';
    const stage      = lesson.stage      || lesson.level || '3';
    try {
      const r = await fetch(`${PROXY_URL_ST}/problems/curriculum/${curriculum}/${unit}/${stage}/practice`);
      _allPracticeProblems = r.ok ? await r.json() : [];
    } catch(e) { _allPracticeProblems = []; }

    // render skeleton: progress bar + empty container
    render(`
      ${progressBarHtml(2)}
      <h2 style="font-size:1rem;font-weight:700;margin:0 0 20px;color:var(--text)">${escHtml(lesson.title||'')}</h2>
      <div id="st-container"></div>
    `);

    _stProgress = {};
    activateStSubtopic(0);
  }

  function activateStSubtopic(idx) {
    const subs = lesson.subtopics;
    if (idx >= subs.length) { showStCompletion(); return; }
    const sub = subs[idx];

    if (sub.walkthrough && sub.walkthrough.length > 0) {
      renderWalkthrough(sub.walkthrough);
      return;
    }

    document.body.classList.remove('has-walkthrough');

    const container = document.getElementById('st-container');
    if (!container) return;

    // divider (not for first)
    if (idx > 0) {
      const div = document.createElement('div');
      div.className = 'st-divider';
      div.textContent = sub.title || `Tema ${idx+1}`;
      container.appendChild(div);
    }

    // build block
    const block = document.createElement('div');
    block.className = 'st-block';
    block.id = `st-block-${idx}`;

    // concept card tabs
    const tabs = [
      { key:'written',  label:'Teoría'   },
      { key:'example',  label:'Ejemplo'  },
      { key:'visual',   label:'Visual'   },
      { key:'practice', label:'Práctica' }
    ];
    const tabBtns = tabs.map(t =>
      `<button class="tab-btn${t.key==='written'?' active':''}" onclick="switchStTab(${idx},'${t.key}')" id="st-tab-${t.key}-${idx}">${t.key==='written'?'Teoría':t.key==='example'?'Ejemplo':t.key==='visual'?'Visual':'Práctica'}</button>`
    ).join('');

    const writtenHtml  = sub.conceptWritten  ? `<div class="concept-written">${sub.conceptWritten}</div>` : '<p style="color:var(--text-secondary);font-size:0.9rem">Sin contenido.</p>';
    const exampleHtml  = sub.conceptExample  ? `<div class="concept-written">${sub.conceptExample}</div>`  : '<p style="color:var(--text-secondary);font-size:0.9rem">Sin ejemplo.</p>';
    const visualHtml   = sub.conceptVisual   ? `<div class="concept-written">${sub.conceptVisual}</div>`   : '<p style="color:var(--text-secondary);font-size:0.9rem">Sin visual.</p>';
    const practiceHtml = sub.conceptPractice ? `<div class="concept-written">${sub.conceptPractice}</div>` : '<p style="color:var(--text-secondary);font-size:0.9rem">Sin práctica guiada.</p>';

    // inline worked example toggle
    const exHtml = buildStExampleHtml(idx, sub);

    // practice area
    const practiceArea = `<div id="st-practice-${idx}"></div>`;

    block.innerHTML = `
      <div class="concept-card" id="st-concept-${idx}" style="margin-bottom:12px;animation:slideIn 0.3s ease">
        <div class="concept-tabs">${tabBtns}</div>
        <div id="st-written-${idx}"  class="tab-panel active">${writtenHtml}</div>
        <div id="st-example-${idx}"  class="tab-panel">${exampleHtml}</div>
        <div id="st-visual-${idx}"   class="tab-panel">${visualHtml}</div>
        <div id="st-practice-tab-${idx}" class="tab-panel">${practiceHtml}</div>
      </div>
      ${exHtml}
      ${practiceArea}
    `;
    container.appendChild(block);

    // init state
    const ids = (sub.practiceProblems || []);
    const problems = _allPracticeProblems.filter(p => ids.includes(p.id));
    _stProgress[idx] = { problems, probIdx: 0, correct: 0, wrongTotal: 0, wrongOnCurrent: 0, hintLevel: 0, exStep: 0, exOpen: false };

    renderStProblem(idx);
    updateStProgress();

    // scroll to new block
    setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }

  function buildStExampleHtml(idx, sub) {
    if (!sub.example) return '';
    const ex = sub.example;
    const steps = ex.steps || [];
    const total = steps.length;
    if (!total) return '';
    const first = steps[0] || {};
    const dotsHtml = steps.map((_,i) =>
      `<span class="step-dot${i===0?' active':''}" id="st-edot-${idx}-${i}"></span>`
    ).join('');
    return `
      <button class="st-example-btn" id="st-exbtn-${idx}" onclick="toggleStExample(${idx})">
        Ver ejemplo resuelto ▸
      </button>
      <div id="st-expanel-${idx}" style="display:none;margin-bottom:14px">
        <div class="example-card" style="animation:slideIn 0.25s ease">
          <div class="example-header">
            <span class="example-label">Ejemplo</span>
            <div class="step-dots">${dotsHtml}</div>
          </div>
          <div class="equation-display" id="st-eeq-${idx}">${escHtml(first.equation||'')}</div>
          <div class="annotation"       id="st-eann-${idx}">${escHtml(first.annotation||'')}</div>
          <div class="narration"        id="st-enar-${idx}">${escHtml(first.narration||'')}</div>
          <div id="st-evis-${idx}">${first.visual||''}</div>
          <div class="example-nav">
            <button class="nav-btn" onclick="stepStExample(${idx},-1)" id="st-eprev-${idx}">← Anterior</button>
            <span class="step-counter" id="st-estep-${idx}">Paso 1 / ${total}</span>
            <button class="nav-btn" onclick="stepStExample(${idx},1)"  id="st-enext-${idx}">Siguiente →</button>
          </div>
        </div>
      </div>
    `;
  }

  function toggleStExample(idx) {
    const panel = document.getElementById(`st-expanel-${idx}`);
    const btn   = document.getElementById(`st-exbtn-${idx}`);
    if (!panel) return;
    const opening = panel.style.display === 'none';
    panel.style.display = opening ? 'block' : 'none';
    if (btn) btn.textContent = opening ? 'Ocultar ejemplo ▾' : 'Ver ejemplo resuelto ▸';
    _stProgress[idx] && (_stProgress[idx].exOpen = opening);
  }

  function stepStExample(idx, dir) {
    const st = _stProgress[idx];
    if (!st) return;
    const sub = lesson.subtopics[idx];
    const steps = (sub.example && sub.example.steps) || [];
    const total = steps.length;
    st.exStep = Math.max(0, Math.min(total - 1, st.exStep + dir));
    const s = steps[st.exStep] || {};
    const setT = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v || ''; };
    const setH = (id, v) => { const el = document.getElementById(id); if (el) el.innerHTML  = v || ''; };
    setT(`st-eeq-${idx}`,  s.equation   || '');
    setT(`st-eann-${idx}`, s.annotation || '');
    setT(`st-enar-${idx}`, s.narration  || '');
    setH(`st-evis-${idx}`, s.visual     || '');
    setT(`st-estep-${idx}`, `Paso ${st.exStep+1} / ${total}`);
    // dots
    const dots = document.querySelectorAll(`[id^="st-edot-${idx}-"]`);
    dots.forEach((d,i) => d.classList.toggle('active', i === st.exStep));
    const prev = document.getElementById(`st-eprev-${idx}`);
    const next = document.getElementById(`st-enext-${idx}`);
    if (prev) prev.disabled = st.exStep === 0;
    if (next) next.disabled = st.exStep === total - 1;
  }

  function switchStTab(idx, tab) {
    const panels = { written:`st-written-${idx}`, example:`st-example-${idx}`, visual:`st-visual-${idx}`, practice:`st-practice-tab-${idx}` };
    const tabIds  = { written:`st-tab-written-${idx}`, example:`st-tab-example-${idx}`, visual:`st-tab-visual-${idx}`, practice:`st-tab-practice-${idx}` };
    Object.entries(panels).forEach(([k, id]) => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('active', k === tab);
    });
    Object.entries(tabIds).forEach(([k, id]) => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('active', k === tab);
    });
  }

  function renderStProblem(idx) {
    const area = document.getElementById(`st-practice-${idx}`);
    if (!area) return;
    const st = lesson.subtopics[idx];
    const prog = _stProgress[idx];
    if (!prog || !prog.problems.length) {
      area.innerHTML = '<p style="color:var(--text-secondary);font-size:0.88rem;padding:12px 0">Sin problemas de práctica para este tema.</p>';
      showStNextSubtopicBtn(idx);
      return;
    }
    if (prog.probIdx >= prog.problems.length) {
      showStNextSubtopicBtn(idx);
      return;
    }
    const problem = prog.problems[prog.probIdx];
    const hints = problem.hints || [];
    let hintsHtml = '';
    for (let h = 0; h < prog.hintLevel && h < hints.length; h++) {
      hintsHtml += `<div class="st-hint-box">${escHtml(hints[h])}</div>`;
    }
    const reviewBtn = prog.wrongTotal >= 3
      ? `<button class="st-example-btn" style="margin-bottom:8px" onclick="scrollToStConcept(${idx})">↑ Revisar concepto</button>`
      : '';

    let inputHtml = '';
    if (problem.format === 'mcq' && problem.options) {
      const opts = problem.options.map((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        return `<button class="st-mcq-opt" id="st-mcq-${idx}-${i}" onclick="submitStMcq(${idx},'${letter}')">${letter}) ${escHtml(opt)}</button>`;
      }).join('');
      inputHtml = `<div class="st-mcq-opts">${opts}</div>`;
    } else {
      inputHtml = `
        <div class="st-open-row">
          <input class="st-open-input" id="st-open-${idx}" type="text" placeholder="Tu respuesta..."
            onkeydown="if(event.key==='Enter')submitStOpen(${idx})">
          <button class="st-submit-btn" onclick="submitStOpen(${idx})">Verificar</button>
        </div>
      `;
    }

    area.innerHTML = `
      ${reviewBtn}
      <div class="st-problem-card">
        <div class="st-problem-label">Problema ${prog.probIdx + 1} / ${prog.problems.length}</div>
        <div class="st-problem-text">${escHtml(problem.question)}</div>
      </div>
      ${hintsHtml}
      ${inputHtml}
      <div id="st-feedback-${idx}"></div>
    `;

    // focus open input
    const inp = document.getElementById(`st-open-${idx}`);
    if (inp) setTimeout(() => inp.focus(), 80);
  }

  function submitStMcq(idx, letter) {
    const prog = _stProgress[idx];
    if (!prog) return;
    const problem = prog.problems[prog.probIdx];
    if (!problem) return;
    const correct = letter.toUpperCase() === String(problem.answer).trim().toUpperCase();
    // disable all buttons
    const opts = document.querySelectorAll(`[id^="st-mcq-${idx}-"]`);
    opts.forEach(b => {
      b.disabled = true;
      const bLetter = b.id.replace(`st-mcq-${idx}-`, '');
      const bChar = String.fromCharCode(65 + parseInt(bLetter));
      if (bChar === letter) b.classList.add(correct ? 'st-mcq-correct' : 'st-mcq-wrong');
      if (!correct && bChar === String(problem.answer).trim().toUpperCase()) b.classList.add('st-mcq-correct');
    });
    if (correct) { onStCorrect(idx); }
    else         { onStWrong(idx); }
  }

  function submitStOpen(idx) {
    const prog = _stProgress[idx];
    if (!prog) return;
    const problem = prog.problems[prog.probIdx];
    if (!problem) return;
    const inp = document.getElementById(`st-open-${idx}`);
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) return;
    inp.disabled = true;
    const correct = stCheckAnswer(val, problem);
    if (correct) { onStCorrect(idx); }
    else         { onStWrong(idx); }
  }

  function onStCorrect(idx) {
    const prog = _stProgress[idx];
    prog.correct++;
    prog.wrongOnCurrent = 0;
    prog.hintLevel = 0;
    const fb = document.getElementById(`st-feedback-${idx}`);
    if (fb) {
      fb.innerHTML = `<div class="st-feedback st-feedback-correct">¡Correcto! ✓</div>`;
    }
    if (prog.correct >= 2) {
      setTimeout(() => showStNextSubtopicBtn(idx), 700);
    } else {
      prog.probIdx = Math.min(prog.probIdx + 1, prog.problems.length - 1);
      setTimeout(() => renderStProblem(idx), 800);
    }
  }

  function onStWrong(idx) {
    const prog = _stProgress[idx];
    prog.wrongOnCurrent++;
    prog.wrongTotal++;
    // auto-advance hint after 2 wrong on same problem
    if (prog.wrongOnCurrent >= 2) {
      const problem = prog.problems[prog.probIdx];
      const maxHints = (problem && problem.hints) ? problem.hints.length : 0;
      if (prog.hintLevel < maxHints) prog.hintLevel++;
      prog.wrongOnCurrent = 0;
    }
    const fb = document.getElementById(`st-feedback-${idx}`);
    if (fb) {
      const problem = prog.problems[prog.probIdx];
      const hints = problem ? (problem.hints || []) : [];
      const nextHint = prog.hintLevel < hints.length ? hints[prog.hintLevel] : null;
      fb.innerHTML = `<div class="st-feedback st-feedback-wrong">Incorrecto. Inténtalo de nuevo.</div>`;
    }
    setTimeout(() => renderStProblem(idx), 800);
  }

  function showStNextSubtopicBtn(idx) {
    const area = document.getElementById(`st-practice-${idx}`);
    if (!area) return;
    const subs = lesson.subtopics;
    const isLast = (idx === subs.length - 1);
    const btnLabel = isLast ? '¡Listo! Ver resumen →' : 'Siguiente tema →';
    area.innerHTML = `
      <div class="st-problem-card" style="background:var(--teal-light);border-color:var(--teal);text-align:center">
        <div style="color:var(--teal);font-weight:700;margin-bottom:10px">¡Bien hecho! Tema completado ✓</div>
        <button class="main-btn" style="margin:0 auto;display:inline-block" onclick="collapseStSubtopic(${idx})">${btnLabel}</button>
      </div>
    `;
  }

  function collapseStSubtopic(idx) {
    const block = document.getElementById(`st-block-${idx}`);
    const sub   = lesson.subtopics[idx];
    if (block) {
      const row = document.createElement('div');
      row.className = 'st-completed-row';
      row.id = `st-done-${idx}`;
      row.innerHTML = `<span class="st-completed-icon">✓</span><span class="st-completed-title">${escHtml(sub.title||`Tema ${idx+1}`)}</span>`;
      block.replaceWith(row);
      // also remove preceding divider if any
      const prev = row.previousElementSibling;
      if (prev && prev.classList.contains('st-divider')) prev.remove();
    }
    updateStProgress();
    const subs = lesson.subtopics;
    if (idx + 1 < subs.length) {
      activateStSubtopic(idx + 1);
    } else {
      showStCompletion();
    }
  }

  function showStCompletion() {
    const container = document.getElementById('st-container');
    if (!container) return;
    const subs = lesson.subtopics || [];
    const listItems = subs.map((s,i) =>
      `<li><span class="st-check">✓</span>${escHtml(s.title||`Tema ${i+1}`)}</li>`
    ).join('');
    const card = document.createElement('div');
    card.className = 'st-completion-card';
    card.innerHTML = `
      <h2>¡Lección completada!</h2>
      <p style="font-size:0.9rem;color:var(--accent-dark,var(--accent));margin-bottom:4px">Dominaste todos los temas de esta lección.</p>
      <ul class="st-summary-list">${listItems}</ul>
      <button class="main-btn" style="margin:0 auto;display:inline-block" onclick="showPractice()">${Lang.t('example_btn_try_yourself')}</button>
    `;
    container.appendChild(card);
    setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'center' }), 50);

    // mark lesson progress
    try {
      const studentId = localStorage.getItem('studentId');
      if (studentId && lesson) {
        fetch(`${PROXY_URL_ST}/student/${studentId}/progress`, {
          method:'PUT',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ unit: lesson.unit||'aritmetica', stage: lesson.stage||lesson.level||'3', status:'concepts_done' })
        }).catch(()=>{});
      }
    } catch(e) {}
  }

  function updateStProgress() {
    const subs = lesson.subtopics || [];
    const done = subs.filter((_,i) => document.getElementById(`st-done-${i}`)).length;
    const total = subs.length;
    const pct = total ? Math.round((done / total) * 60 + 10) : 10; // 10–70% range for concept phase
    const fill = document.querySelector('.progress-fill');
    const text = document.querySelector('.progress-text');
    if (fill) fill.style.width = `${pct}%`;
    if (text) text.textContent = `${pct}%`;
  }

  function scrollToStConcept(idx) {
    const el = document.getElementById(`st-concept-${idx}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  // ── Walkthrough engine ────────────────────────────────────────
  function renderWalkthrough(steps) {
    function gridSvg(colId) {
      return `<svg class="wt-grid-svg" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="gp-${colId}" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M 28 0 L 0 0 0 28" fill="none" stroke="#E8E6E0" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#gp-${colId})"/></svg>`;
    }

    document.body.classList.add("has-walkthrough"); render(`
      ${progressBarHtml(2)}
      ${badgeHtml()}
      <h1>${escHtml(lesson.title || '')}</h1>
      <div class="walkthrough-board" id="wt-board">
        <div class="wt-topbar" id="wt-topbar">
          <div style="display:flex;gap:8px">
            <button class="wt-ctrl-btn" id="wt-pause-btn" onclick="wtTogglePause()">&#9208; Pausar</button>
            <button class="wt-ctrl-btn" onclick="wtRestart()">&#8634; Reiniciar</button>
            <button class="wt-ctrl-btn" id="wt-audio-toggle" onclick="toggleAudio()">&#128266;</button>
          </div>
          <span id="wt-step-info" style="font-size:0.72rem;color:var(--text-secondary)"></span>
        </div>
        <div class="wt-columns">
          <div id="wt-col-theory" class="wt-col col-theory">
            <div class="wt-col-label">TEOR&Iacute;A</div>
            <div class="wt-col-content" id="wt-notes"></div>
          </div>
          <div id="wt-rail" class="wt-rail">
            <div style="position:absolute;top:14px;bottom:14px;left:50%;width:1px;background:var(--wt-border);transform:translateX(-50%);z-index:0;"></div>
          </div>
          <div class="wt-col col-prob">
            ${gridSvg('prob')}
            <div class="wt-col-label">problema</div>
            <div class="wt-col-content" id="wt-col-prob"></div>
          </div>
          <div class="wt-col col-calc">
            ${gridSvg('calc')}
            <div class="wt-col-label">c&aacute;lculos</div>
            <div class="wt-col-content" id="wt-col-calc"><div class="wt-calc-track" id="wt-calc-track"></div></div>
          </div>
        </div>
        <div class="wt-bottombar">
          <div id="wt-status"></div>
        </div>
      </div>
    `);
    document.body.classList.add('has-walkthrough');

    // ── Closure state ──────────────────────────────────────────
    const _s = { idx: 0, paused: false, waiting: false, tries: 0, timer: null };
    let audioEnabled = true;

    function playStepAudio(file) {
      if (!audioEnabled || !file) return;
      new Audio(walkthroughAudioUrl(file)).play();
    }

    function typewriterReveal(rootEl) {
      var walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
        acceptNode: function (n) {
          var p = n.parentElement;
          if (p && p.closest('.wt-note-diagram-seq, .wt-note-ds-item')) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      var textNodes = [];
      var node;
      while ((node = walker.nextNode())) {
        if (node.nodeValue.trim()) textNodes.push(node);
      }
      var fullTexts = textNodes.map(function(n) {
        var full = n.nodeValue;
        n.nodeValue = '';
        return full;
      });
      var nIdx = 0, cIdx = 0;
      function tick() {
        if (nIdx >= textNodes.length) return;
        cIdx++;
        textNodes[nIdx].nodeValue = fullTexts[nIdx].slice(0, cIdx);
        if (cIdx >= fullTexts[nIdx].length) { nIdx++; cIdx = 0; }
        setTimeout(tick, 140);
      }
      if (textNodes.length) tick();
    }

    function markDiagramStepDone(el) {
      if (!el) {
        const open = document.querySelectorAll('#wt-notes .wt-note-diagram:not(.wt-note-diagram--done)');
        el = open.length ? open[open.length - 1] : null;
      }
      if (!el || el.classList.contains('wt-note-diagram--done')) return;
      el.classList.add('wt-note-diagram--done');
      const label = el.querySelector('.wt-note-label');
      if (label && !label.querySelector('.wt-note-diagram-check')) {
        label.insertAdjacentHTML('beforeend', '<span class="wt-note-diagram-check" aria-hidden="true">\u2713</span>');
      }
    }

    function sealOpenDiagrams(container) {
      if (!container) return;
      container.querySelectorAll('.wt-note-diagram:not(.wt-note-diagram--done)').forEach(markDiagramStepDone);
    }

    function renderNote(note, instant) {
      if (!note) return;
      const container = document.getElementById('wt-notes');
      if (!container) return;
      if (note.type === 'check' || note.type === 'formula') return;
      if (note.type === 'diagram') {
        sealOpenDiagrams(container);
      }
      let html = '';
      if (note.type === 'rule') {
        const diagramHtml = note.diagram.map(function(item) {
          return '<span class="wt-note-ds-item ' + (item === note.active ? 'wt-note-ds-active ' : '') + 'wt-note-ds-' + item.replace('/','') + '">' + item + '</span>';
        }).join('<span class="wt-note-ds-arrow">\u2192</span>');
        html = '<div class="wt-note wt-note-rule"><div class="wt-note-label">' + note.label + '</div><div class="wt-note-rule-title">' + note.content + '</div><div class="wt-note-diagram-seq">' + diagramHtml + '</div></div>';
      } else if (note.type === 'formula') {
        html = '<div class="wt-note wt-note-formula"><div class="wt-note-label">' + note.label + '</div><div class="wt-note-formula-content">' + note.content + '</div></div>';
      } else if (note.type === 'check') {
        html = '<div class="wt-note wt-note-check"><span class="wt-note-check-icon">\u2713</span><span class="wt-note-check-text">' + note.text + '</span></div>';
      } else if (note.type === 'legend') {
        const rowsHtml = (note.lines || []).map(function (line) {
          const chip = String(line.chip || '');
          const chipCls = 'wt-note-ds-' + chip.replace('/', '');
          return '<div class="wt-note-legend-row"><span class="wt-note-ds-item ' + chipCls + '">' + escHtml(chip) + '</span><span>' + escHtml(line.text) + '</span></div>';
        }).join('');
        html = '<div class="wt-note wt-note-legend"><div class="wt-note-label">' + note.label + '</div><div class="wt-note-legend-rows">' + rowsHtml + '</div></div>';
      } else if (note.type === 'diagram') {
        const diagramHtml = note.diagram.map(function(item) {
          return '<span class="wt-note-ds-item ' + (item === note.active ? 'wt-note-ds-active ' : '') + 'wt-note-ds-' + item.replace('/','') + '">' + item + '</span>';
        }).join('<span class="wt-note-ds-arrow">\u2192</span>');
        const bodyText = note.text || note.hint || note.meaning || '';
        const textHtml = bodyText
          ? '<div class="wt-note-diagram-text">' + escHtml(bodyText) + '</div>'
          : '';
        html = '<div class="wt-note wt-note-diagram"><div class="wt-note-label">' + note.label + '</div><div class="wt-note-diagram-seq">' + diagramHtml + '</div>' + textHtml + '</div>';
      }      if (!html) return;
      container.insertAdjacentHTML('beforeend', html);
      const noteEl = container.lastElementChild;
      if (!instant && noteEl) {
        if (note.type === 'diagram' && (note.text || note.hint || note.meaning)) {
          const textEl = noteEl.querySelector('.wt-note-diagram-text');
          if (textEl) typewriterReveal(textEl);
        } else if (note.type !== 'diagram') {
          typewriterReveal(noteEl);
        }
      }
    }

    function _clearContinueTimer() {
      if (_s.timer) {
        clearTimeout(_s.timer);
        _s.timer = null;
      }
    }

    function _scheduleContinue(pause) {
      _clearContinueTimer();
      _s.timer = setTimeout(_resume, pause != null ? pause : 0);
    }

    function _setStatus(mode) {
      const el = document.getElementById('wt-status');
      if (!el) return;
      if (mode === 'writing') {
        el.innerHTML = '<div class="wt-writing-dots"><span></span><span></span><span></span></div>';
      } else if (mode === 'waiting') {
        el.innerHTML = '<div class="wt-wait-dot"></div>';
      } else {
        el.innerHTML = '';
      }
    }

    function _updateBar() {
      const fill = document.getElementById('wt-pfill');
      const info = document.getElementById('wt-step-info');
      const pct  = _s.idx >= steps.length ? 100 : Math.round((_s.idx / steps.length) * 100);
      if (fill) fill.style.width = pct + '%';
      if (info) info.textContent = _s.idx < steps.length
        ? ('Paso ' + (_s.idx + 1) + ' / ' + steps.length)
        : 'Completado';
      document.querySelectorAll('.wt-rail-marker').forEach(function(m) {
        const si = parseInt(m.dataset.stepIdx);
        const isDone = si < _s.idx;
        const isActive = si === _s.idx;
        m.className = 'wt-rail-marker' + (isDone ? ' done' : isActive ? ' active' : '');
        const ic = m.querySelector('.wt-rail-icon');
        if (ic) ic.className = 'wt-rail-icon ti ' + (isDone ? 'ti-check' : 'ti-rotate-clockwise');
      });
    }

    // ── Cálculos filmstrip (one card per step index) ─────────────
    function _calcTrack() {
      return document.getElementById('wt-calc-track');
    }

    function _calcCardForStep(stepIdx) {
      var track = _calcTrack();
      if (!track) return null;
      return track.querySelector('.wt-calc-card[data-step-idx="' + stepIdx + '"]');
    }

    function _calcFilmstripFocus(stepIdx) {
      var viewport = document.getElementById('wt-col-calc');
      var track = _calcTrack();
      if (!viewport || !track) return;
      var cards = track.querySelectorAll('.wt-calc-card');
      cards.forEach(function (card) {
        var si = parseInt(card.dataset.stepIdx, 10);
        card.classList.remove('is-current', 'is-ghost', 'is-past');
        if (si < stepIdx - 1) card.classList.add('is-past');
        else if (si === stepIdx - 1) card.classList.add('is-ghost');
        else if (si === stepIdx) card.classList.add('is-current');
        else card.classList.add('is-past');
      });
      var current = _calcCardForStep(stepIdx);
      if (!current) return;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var vpW = viewport.clientWidth;
          var cardL = current.offsetLeft;
          var cardW = current.offsetWidth;
          var offset = cardL + cardW / 2 - vpW / 2;
          track.style.transform = 'translateX(' + (-offset) + 'px)';
        });
      });
    }

    function _calcAppendCard(stepIdx, innerHTML, kind) {
      if (_calcCardForStep(stepIdx)) return _calcCardForStep(stepIdx);
      var track = _calcTrack();
      if (!track) return null;
      var card = document.createElement('div');
      card.className = 'wt-calc-card';
      card.dataset.stepIdx = String(stepIdx);
      card.dataset.kind = kind || 'write';
      if (innerHTML) card.innerHTML = innerHTML;
      track.appendChild(card);
      _calcFilmstripFocus(stepIdx);
      return card;
    }

    function _calcResolveQuestionCard(stepIdx, html) {
      var card = _calcCardForStep(stepIdx);
      if (!card) return;
      card.dataset.kind = 'resolved';
      card.innerHTML = html;
      _calcFilmstripFocus(stepIdx);
    }

    function _appendWrite(step, replayStepIdx) {
      const col = document.getElementById('wt-col-' + step.col);
      if (!col) return;
      if (step.col === 'theory') {
        const notes = document.getElementById('wt-notes');
        if (notes && step.html && !step.note) notes.insertAdjacentHTML('beforeend', step.html);
      } else if (step.col === 'calc') {
        var calcIdx = replayStepIdx != null ? replayStepIdx : _s.idx;
        _calcAppendCard(calcIdx, step.html, 'write');
      } else if (step.col === 'prob') {
        const existing = col.querySelectorAll('.prob-line');
        existing.forEach(function(el) { el.classList.add('dimmed'); el.classList.remove('final'); });
        const line = document.createElement('div');
        line.className = 'prob-line' + (step.final ? ' final' : '');
        const needsArrow = existing.length > 0 && !step.final;
        line.innerHTML = (needsArrow ? '<span class="prob-arrow">= </span>' : '') + step.html;
        col.appendChild(line);
        scheduleSyncRailMarkers();
      }
    }

    function _appendQuestion(step, replayStepIdx) {
      var qIdx = replayStepIdx != null ? replayStepIdx : _s.idx;
      if (_calcCardForStep(qIdx)) return;
      var card = _calcAppendCard(qIdx,
        '<div class="wt-q-bubble" id="wt-qbub">' +
        '<div class="wt-q-text">' + escHtml(step.question) + '</div>' +
        '<div class="wt-q-hint">' + escHtml(step.hint) + '</div>' +
        '<div class="wt-q-row">' +
        '<input class="wt-q-input" id="wt-qinp" type="text" placeholder="?"' +
        ' onkeydown="if(event.key===\'Enter\')wtSubmitAnswer()">' +
        '<button class="wt-q-btn" onclick="wtSubmitAnswer()">Listo</button>' +
        '</div>' +
        '<div class="wt-q-trytext" id="wt-qtry"></div>' +
        '</div>',
        'question');
      if (!card) return;
      setTimeout(function() { const inp = document.getElementById('wt-qinp'); if (inp) inp.focus(); }, 100);
    }

    function _resume() {
      if (_s.paused || _s.waiting) return;
      if (_s.idx >= steps.length) { _onComplete(); return; }
      const step = steps[_s.idx];
      _setStatus('writing');
      _updateBar();
      if (step.type === 'write') {
        _appendWrite(step);
        renderNote(step.note);
        _s.idx++;
        const pause = step.pause != null ? step.pause : 0;
        if (audioEnabled && step.audio) {
          const aud = new Audio(walkthroughAudioUrl(step.audio));
          var continued = false;
          function continueOnce() {
            if (continued) return;
            continued = true;
            _scheduleContinue(pause);
          }
          aud.onended = continueOnce;
          aud.onerror = continueOnce;
          aud.play().catch(continueOnce);
        } else {
          _scheduleContinue(pause);
        }
      } else if (step.type === 'question') {
        _appendQuestion(step);
        playStepAudio(step.audio);
        _s.idx++;
        _s.tries = 0;
        _s.waiting = true;
        _setStatus('waiting');
      }
    }

    function _onComplete() {
      window.removeEventListener('resize', onWtRailLayout);
      const _probScrollEl = document.getElementById('wt-col-prob');
      if (_probScrollEl) _probScrollEl.removeEventListener('scroll', onWtRailLayout);
      /* Keep body.has-walkthrough so .container stays wide until navigation (e.g. Practicar). */
      document.querySelectorAll('audio').forEach(function(a) { a.pause(); a.currentTime = 0; });
      _setStatus('');
      const fill = document.getElementById('wt-pfill');
      if (fill) fill.style.width = '100%';
      const info = document.getElementById('wt-step-info');
      if (info) info.textContent = 'Completado';
      const topbar = document.getElementById('wt-topbar');
      if (topbar) topbar.style.display = 'none';
      const board = document.getElementById('wt-board');
      if (board) {
        const btn = document.createElement('button');
        btn.className = 'main-btn';
        btn.style.marginTop = '16px';
        btn.textContent = 'Practicar \u2192';
        btn.onclick = function() { showPractice(); };
        board.insertAdjacentElement('afterend', btn);
      }
    }

    // ── Global handlers (fresh closure each call) ──────────────
    window.wtTogglePause = function() {
      if (_s.waiting) return;
      _s.paused = !_s.paused;
      const btn = document.getElementById('wt-pause-btn');
      if (btn) btn.textContent = _s.paused ? '\u25B6 Reanudar' : '&#9208; Pausar';
      if (_s.paused) _clearContinueTimer();
      else _resume();
    };

    window.wtRestart = function() {
      _clearContinueTimer();
      _s.idx = 0; _s.paused = false; _s.waiting = false; _s.tries = 0; _s.timer = null;
      const theoryEl = document.getElementById('wt-col-theory');
      if (theoryEl) theoryEl.innerHTML = '<div class="wt-col-label">TEOR\u00CDA</div><div class="wt-col-content" id="wt-notes"></div>';
      const probEl = document.getElementById('wt-col-prob');
      if (probEl) probEl.innerHTML = '';
      var calcTrack = _calcTrack();
      if (calcTrack) {
        calcTrack.innerHTML = '';
        calcTrack.style.transform = '';
      }
      const btn = document.getElementById('wt-pause-btn');
      if (btn) btn.textContent = '\u23F8 Pausar';
      _setStatus('writing');
      _updateBar();
      scheduleSyncRailMarkers();
      _resume();
    };

    function _jumpTo(targetIdx) {
      const theoryEl = document.getElementById('wt-col-theory');
      if (theoryEl) theoryEl.innerHTML = '<div class="wt-col-label">TEOR\u00CDA</div><div class="wt-col-content" id="wt-notes"></div>';
      const probEl = document.getElementById('wt-col-prob');
      if (probEl) probEl.innerHTML = '';
      var calcTrack = _calcTrack();
      if (calcTrack) {
        calcTrack.innerHTML = '';
        calcTrack.style.transform = '';
      }
      _clearContinueTimer();
      var lastCalcIdx = null;
      for (var i = 0; i < targetIdx; i++) {
        var step = steps[i];
        if (step.type === 'write') {
          if (step.col === 'calc') lastCalcIdx = i;
          _appendWrite(step, i);
          renderNote(step.note, true);
        }
        if (step.type === 'question') {
          _calcResolveQuestionCard(i, '<div class="calc-line">' + step.correct + '</div>');
          lastCalcIdx = i;
          markDiagramStepDone();
        }
      }
      _s.idx = targetIdx;
      _s.paused = false;
      _s.waiting = false;
      _s.tries = 0;
      var targetStep = steps[targetIdx];
      var targetIsCalc = targetStep && targetStep.col === 'calc';
      if (lastCalcIdx != null && !targetIsCalc) _calcFilmstripFocus(lastCalcIdx);
      _updateBar();
      scheduleSyncRailMarkers();
      _resume();
    }

    window.toggleAudio = function() {
      audioEnabled = !audioEnabled;
      const btn = document.getElementById('wt-audio-toggle');
      if (btn) btn.textContent = audioEnabled ? '\uD83D\uDD0A' : '\uD83D\uDD07';
      if (!audioEnabled) document.querySelectorAll('audio').forEach(function(a) { a.pause(); a.currentTime = 0; });
    };

    window.wtSubmitAnswer = function() {
      if (!_s.waiting) return;
      const inp = document.getElementById('wt-qinp');
      if (!inp || inp.disabled) return;
      const raw = inp.value.trim();
      if (!raw) return;
      const norm = raw.replace(/\xD7/g, '*').replace(/\xF7/g, '/').replace(/,/g, '.');
      const step = steps[_s.idx - 1];
      const ans  = String(step.answer);
      let correct = false;
      const nIn = parseFloat(norm), nAns = parseFloat(ans);
      if (!isNaN(nIn) && !isNaN(nAns) && Math.abs(nIn - nAns) < 1e-9) correct = true;
      if (!correct && norm === ans.trim()) correct = true;
      if (!correct) {
        try {
          if (typeof Algebrite !== 'undefined') {
            if (Algebrite.run('simplify((' + norm + ')-(' + ans + '))') === '0') correct = true;
          }
        } catch(e) {}
      }
      _s.tries++;
      var qStepIdx = _s.idx - 1;
      if (correct) {
        inp.disabled = true;
        _calcResolveQuestionCard(qStepIdx, '<div class="calc-line">' + step.correct + '</div>');
        markDiagramStepDone();
        _s.waiting = false;
        _setStatus('writing');
        _scheduleContinue(1200);
      } else if (_s.tries >= 2) {
        inp.disabled = true;
        _calcResolveQuestionCard(qStepIdx,
          '<div class="calc-line" style="color:var(--text-secondary)">' + step.wrong + '</div>');
        markDiagramStepDone();
        _s.waiting = false;
        _setStatus('writing');
        _scheduleContinue(1600);
      } else {
        inp.classList.add('wrong');
        setTimeout(function() { inp.classList.remove('wrong'); inp.value = ''; inp.focus(); }, 320);
        const tryEl = document.getElementById('wt-qtry');
        if (tryEl) tryEl.textContent = 'intento ' + _s.tries + ' de 2 \u2014 int\u00E9ntalo de nuevo';
      }
    };

    // ── Kick off ───────────────────────────────────────────────
    var railMarkers = [];
    for (var rj = 0; rj < steps.length; rj++) {
      var stp = steps[rj];
      if (stp.type === 'write' && stp.col === 'prob') {
        railMarkers.push({
          stepIdx: rj,
          label: stp.railLabel || ('Paso ' + (railMarkers.length + 1)),
        });
      }
    }

    var _wtRailLayoutTimer = null;
    function syncRailMarkersToProbLines() {
      var rail = document.getElementById('wt-rail');
      var probEl = document.getElementById('wt-col-prob');
      if (!rail || !probEl) return;
      var lines = probEl.querySelectorAll('.prob-line');
      var wraps = rail.querySelectorAll('.wt-rail-marker-wrap');
      if (!wraps.length) return;
      var railRect = rail.getBoundingClientRect();
      var lineGap = 26;
      if (lines.length >= 2) {
        var ra = lines[0].getBoundingClientRect();
        var rb = lines[1].getBoundingClientRect();
        lineGap = rb.top - ra.top;
      } else if (lines.length === 1) {
        var cs = getComputedStyle(lines[0]);
        lineGap =
          lines[0].getBoundingClientRect().height +
          parseFloat(cs.marginBottom || '0') +
          parseFloat(cs.marginTop || '0');
        if (lineGap < 18) lineGap = 26;
      }
      for (var wi = 0; wi < wraps.length; wi++) {
        var wrap = wraps[wi];
        var centerY;
        if (lines[wi]) {
          var lr = lines[wi].getBoundingClientRect();
          centerY = lr.top + lr.height / 2 - railRect.top;
        } else if (lines[0]) {
          var r0 = lines[0].getBoundingClientRect();
          centerY = r0.top + r0.height / 2 - railRect.top + wi * lineGap;
        } else {
          centerY = 40 + wi * lineGap;
        }
        wrap.style.top = Math.round(centerY) + 'px';
      }
    }

    function scheduleSyncRailMarkers() {
      requestAnimationFrame(function() {
        requestAnimationFrame(syncRailMarkersToProbLines);
      });
    }

    function onWtRailLayout() {
      if (_wtRailLayoutTimer) clearTimeout(_wtRailLayoutTimer);
      _wtRailLayoutTimer = setTimeout(function() {
        _wtRailLayoutTimer = null;
        syncRailMarkersToProbLines();
      }, 50);
    }
    window.addEventListener('resize', onWtRailLayout);

    const rail = document.getElementById('wt-rail');
    const probCol = document.getElementById('wt-col-prob');
    if (probCol) probCol.addEventListener('scroll', onWtRailLayout, { passive: true });

    if (rail) {
      railMarkers.forEach(function(rm) {
        const wrap = document.createElement('div');
        wrap.className = 'wt-rail-marker-wrap';
        const marker = document.createElement('div');
        marker.className = 'wt-rail-marker';
        marker.dataset.stepIdx = rm.stepIdx;
        marker.innerHTML = '<i class="wt-rail-icon ti ti-rotate-clockwise" aria-hidden="true"></i>';
        marker.onclick = function() { _jumpTo(rm.stepIdx); };
        const tooltip = document.createElement('div');
        tooltip.className = 'wt-rail-tooltip';
        tooltip.textContent = rm.label;
        wrap.appendChild(marker);
        wrap.appendChild(tooltip);
        rail.appendChild(wrap);
      });
    }
    _setStatus('writing');
    _updateBar();
    scheduleSyncRailMarkers();
    _resume();
  }

  init();
</script>
